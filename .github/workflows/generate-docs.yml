name: Generate Documentation

on:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 0 * * *' # Example: Run daily

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout my-docs repository
        uses: actions/checkout@v4
        with:
          path: my-docs

      - name: Checkout my-apps repository
        uses: actions/checkout@v4
        with:
          repository: centervil/my-apps
          path: my-apps
          # If my-apps is private, a PAT would be needed here
          # token: ${{ secrets.MY_APPS_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv oasis

      - name: Create .env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NOTE_EMAIL=${{ secrets.NOTE_EMAIL }}" >> .env
          echo "NOTE_PASSWORD=${{ secrets.NOTE_PASSWORD }}" >> .env
          echo "NOTE_USER_ID=${{ secrets.NOTE_USER_ID }}" >> .env
          echo "LLM_MODEL=${{ secrets.LLM_MODEL }}" >> .env
          echo "FIREFOX_BINARY_PATH=/usr/bin/firefox" >> .env
          echo "FIREFOX_PROFILE_PATH=${{ github.workspace }}/.firefox_profile" >> .env

      - name: Run documentation generator
        run: |
          cd ./my-apps/tools/doc-generator
          python note_post.py --folder ../../../my-docs/research --firefox-headless

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Auto-generate documentation"
          # Specify the repository path if not in the root
          repository: ./my-docs